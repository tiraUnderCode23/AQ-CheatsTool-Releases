name: aq_cheats_tool
description: AQ///bimmer BMW Cheats Tool - Professional BMW diagnostic and customization tool
publish_to: 'none'
version: 3.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  auto_size_text: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  
  # Network & API
  http: ^1.1.2
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # File Operations
  file_picker: ^6.1.1
  open_file: ^3.3.2
  archive: ^3.4.10
  
  # Clipboard & Share
  share_plus: ^7.2.1
  
  # Device & Network Info
  network_info_plus: ^4.1.0
  device_info_plus: ^9.1.1
  connectivity_plus: ^5.0.2
  
  # JSON & Data
  json_annotation: ^4.8.1
  
  # Crypto & Security
  crypto: ^3.0.3
  encrypt: ^5.0.3
  
  # URL Launcher
  url_launcher: ^6.2.2
  
  # Animations
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  
  # Glass/Blur Effects
  glassmorphism: ^3.0.0
  blur: ^3.1.0
  
  # Responsive & Scaling
  flutter_screenutil: ^5.9.0
  responsive_builder: ^0.7.0
  flutter_scalify: ^1.0.0
  
  # Window Management (Desktop)
  window_manager: ^0.3.7
  bitsdojo_window: ^0.1.6
  
  # Fluent UI (for PSDZ Ultimate)
  fluent_ui: 4.11.0
  math_expressions: 2.6.0
  
  # WebView
  webview_flutter: ^4.4.4
  
  # Internationalization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    - assets/data/
    - assets/guides/
    - assets/attachments/
    - assets/attachments/putty/
    - assets/clock_images/
    - assets/clock_images/common/
    - assets/clock_images/clock/
    - assets/hero_images/
    - assets/putty/
